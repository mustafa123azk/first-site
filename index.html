<!DOCTYPE html>
<html>
<head>
    <title>My Tech Project</title>
    <style>
        :root {
            --bg-color: #f0f0f0;
            --text-color: #333333;
        }

        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: 0.4s ease;
        }

        .main-image {
            width: 300px;
            max-width: 80%;
            height: auto;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .my-button {
            background-color: #007bff;
            color: white;
        }

        .my-button:hover {
            transform: scale(1.05);
            background-color: #0056b3;
        }

        .mode-button {
            background-color: #444;
            color: white;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <h1>Hello World!</h1>
    <p>I am building this website from scratch.</p>

    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">
        <img src="website.jpg" alt="My Tech Photo" class="main-image">
    </a>

    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" style="text-decoration: none;">
        <button class="my-button">Click Me!</button>
    </a>
    
    <button class="mode-button" onclick="toggleDarkMode()">Switch Dark/Light</button>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
        }
    </script>

</body>
</html>
