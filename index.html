<!DOCTYPE html>
<html>
<head>
    <title>My Tech Project</title>
    <style>
        /* 1. VARIABLES - The Control Center */
        :root {
            --bg-color: #f0f0f0;
            --text-color: #333333;
            --btn-color: #007bff;
        }

        /* 2. THE DARK MODE SWITCH */
        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --btn-color: #555555;
        }

        /* 3. BASE STYLES */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: 0.4s ease; /* Makes the transition smooth */
        }

        /* 4. BUTTON STYLES */
        button {
            padding: 20px 40px;
            margin: 15px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .my-button {
            background-color: #007bff;
            color: white;
        }

        .my-button:hover {
            transform: scale(1.1);
            background-color: #0056b3;
        }

        .mode-button {
            background-color: #444;
            color: white;
            font-size: 14px;
            padding: 10px 20px;
        }
    </style>
</head>
<body>

    <h1>Hello World!</h1>
    <p>I am building this website from scratch.</p>

    <button class="my-button">Click Me!</button>
    
    <button class="mode-button" onclick="toggleDarkMode()">Switch Dark/Light</button>

    <script>
        function toggleDarkMode() {
            // This 'toggles' the class on the body
            document.body.classList.toggle("dark-mode");
        }
    </script>

</body>
